name: Build WeGlass.dylib

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WeGlass.dylib
        run: make -C WeGlass

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeGlass.dylib
          path: WeGlass/WeGlass.dylib
          retention-days: 90